- name: 'Scenario 2 - Delegation Nightmare: Password Spray Against Domain Accounts (SRV04-WEB)'
  description: >-
    Simulates early access development against cyberange.local through a low-noise
    password spraying campaign focused on service and employee accounts associated
    with the web tier. The objective is to identify weak credential hygiene around
    the internet-adjacent or business-critical accounts that support SRV04-WEB,
    without generating the volume or lockout patterns of a conventional brute-force
    attack. Defensive evidence would normally include repeated Kerberos
    authentication failures across many usernames, shared source infrastructure, and
    eventual success against an account later used for internal delegation abuse.
  tactic: credential-access
  technique_id: T1110.003
  technique_name: 'Brute Force: Password Spraying'
  singleton: false
  repeatable: true
  delete_payload: false
  executors:
  - name: psh
    platform: windows
    command: |-
      echo "[*] Scenario 2 preflight: password spray path validation"
      echo "[*] Domain: cyberange.local"
      echo "[*] Target account of interest: svc_web"
      echo "[*] Candidate passwords: Summer2025! Welcome2025! Password123! Spring2025!"
      echo

      for host in DC02.cyberange.local SRV04-WEB.cyberange.local; do
        echo "[*] Resolving $host"
        getent hosts "$host" 2>/dev/null || nslookup "$host" 2>/dev/null || echo "[!] DNS lookup failed for $host"
        echo
      done

      if command -v nc >/dev/null 2>&1; then
        echo "[*] Connectivity checks"
        nc -zvw3 DC02.cyberange.local 88 2>&1 || true
        nc -zvw3 DC02.cyberange.local 389 2>&1 || true
        nc -zvw3 SRV04-WEB.cyberange.local 80 2>&1 || true
      else
        echo "[*] nc not present, using ping as fallback"
        ping -c 1 DC02.cyberange.local 2>/dev/null || true
        ping -c 1 SRV04-WEB.cyberange.local 2>/dev/null || true
      fi

      echo
      echo "[*] User set prepared:"
      printf '%s\n' svc_web svc_sql backup_admin jsmith mjones agarcia bwilson clee dkhan enguyen fpatel gmartin hbrown

      echo
      echo "[*] Simulation complete (no Kerberos authentication attempted)"
    code: null
    language: null
    build_target: null
    payloads: []
    uploads: []
    timeout: 300
    parsers: []
    cleanup: []
    variations: []
    additional_info:
      target_host: SRV04-WEB.cyberange.local
      target_ip_suffix: .20
      dc_host: DC02.cyberange.local
      dc_ip_suffix: .10
      domain: cyberange.local
      domain_netbios: CYBERANGE
      lockout_threshold: 0
      target_account:
        username: svc_web
        password: 'Summer2025!'
        spn: 'HTTP/SRV04-WEB.cyberange.local'
        delegation_type: Constrained with Protocol Transition
        delegation_target: 'HTTP/SRV05-API.cyberange.local'
      user_accounts_in_domain:
        service_accounts:
          - svc_web
          - svc_sql
          - backup_admin
        regular_users:
          - jsmith
          - mjones
          - agarcia
          - bwilson
          - clee
          - dkhan
          - enguyen
          - fpatel
          - gmartin
          - hbrown
      common_spray_passwords:
        - 'Summer2025!'
        - 'Welcome2025!'
        - 'Password123!'
        - 'Spring2025!'
      detection_events:
        - '4771 - Kerberos pre-authentication failure (bulk from attacker IP)'
        - '4768 - Kerberos TGT issued for svc_web (successful auth)'
  requirements: []
  id: f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1
